      }

      if (/^[║═╔╗╚╝╠╣╦╩╬┌┐└┘├┤┬┴┼]/.test(t)) {
        return React.createElement('div', { key: i, className: 'leading-relaxed', style: { color: '#34d399', opacity: 0.7 } }, line);
      }

      if (t.startsWith('+')) {
        const rest = t.slice(1).trimStart();
        if (rest.startsWith('[OK]')) {
          return React.createElement('div', { key: i, className: 'leading-relaxed' },

            React.createElement('span', { style: { color: '#34d399', fontWeight: 'bold' } }, '[OK]'),

            React.createElement('span', { style: { color: '#f87171', fontWeight: 'bold' } }, '[ERR]'),
            React.createElement('span', { style: { color: 'rgba(248,113,113,0.8)' } }, rest.slice(5))
          );
        }
        if (rest.startsWith('[WARN]')) {
          return React.createElement('div', { key: i, className: 'leading-relaxed' },
            React.createElement('span', { style: { color: '#34d399', fontWeight: 'bold' } }, '+ '),
            React.createElement('span', { style: { color: '#facc15', fontWeight: 'bold' } }, '[WARN]'),
            React.createElement('span', { style: { color: 'rgba(250,204,21,0.8)' } }, rest.slice(6))
          );
        }
        if (rest.startsWith('[AUTH]')) {
          return React.createElement('div', { key: i, className: 'leading-relaxed' },
            React.createElement('span', { style: { color: '#34d399', fontWeight: 'bold' } }, '+ '),
            React.createElement('span', { style: { color: '#a78bfa', fontWeight: 'bold' } }, '[AUTH]'),
            React.createElement('span', { style: { color: 'rgba(167,139,250,0.8)' } }, rest.slice(6))
          );
        }
        if (rest.includes('ESCAPE COMPLETE') || rest.includes('YOU WIN') || rest.includes('ALIVE')) {
          return React.createElement('div', { key: i, className: 'leading-relaxed' },
            React.createElement('span', { style: { color: '#34d399' } }, '+ '),
            React.createElement('span', { style: { fontWeight: 'bold', background: 'linear-gradient(90deg, #34d399, #22d3ee, #c084fc)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' } }, rest)

        );
      }

      return React.createElement('div', { key: i, className: 'leading-relaxed' }, line);
    }

    function renderDiffContent(content) {
      return content.split('\\n').map((line, i) => formatLine(line, i, true));
    }

    function renderJSContent(content) {
      return content.split('\\n').map((line, i) => formatLine(line, i, false));
    }

    // ---- Terminal Component ----
    function Terminal({ messages, onCommand, history: hist, messagesEndRef }) {
      const [input, setInput] = useState('');
      const [histIndex, setHistIndex] = useState(-1);
      const [focused, setFocused] = useState(false);
      const inputRef = useRef(null);

      useEffect(() => {
        const el = inputRef.current;
        if (el) el.focus();
      }, []);

      useEffect(() => {
        const el = messagesEndRef.current;
        if (el) el.scrollIntoView({ behavior: 'smooth' });
      }, [messages, messagesEndRef]);

      const handleClick = useCallback(() => {
        const el = inputRef.current;
        if (el) el.focus();
      }, []);

      const handleKeyDown = useCallback((e) => {
        if (e.key === 'Enter' && input.trim()) {
          onCommand(input.trim());
          setInput('');
          setHistIndex(-1);
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          if (hist.length > 0) {
            const idx = histIndex === -1 ? hist.length - 1 : Math.max(0, histIndex - 1);
            setHistIndex(idx);
            setInput(hist[idx]);
          }
        } else if (e.key === 'ArrowDown') {
          e.preventDefault();
          if (histIndex >= 0) {
            const idx = histIndex + 1;
            if (idx >= hist.length) {
              setHistIndex(-1);
              setInput('');
            } else {
              setHistIndex(idx);
              setInput(hist[idx]);
            }
          }
        } else if (e.key === 'Tab') {
          e.preventDefault();
          const cmds = ["help","start","ls","cat","cd","grep","shift","sudo","analyze","codex","decrypt","patch","rebuild","launch","employees","archives","memo","clear","admin","status"];
          const match = cmds.find(c => c.startsWith(input.toLowerCase()));
          if (match) setInput(match);
        }
      }, [input, onCommand, hist, histIndex]);

      return React.createElement('div', {
        className: 'terminal',
        onClick: handleClick
      },
        React.createElement('div', { className: 'term-header' },
          React.createElement('div', { style: { display: 'flex', gap: 6 } },
            React.createElement('div', { className: 'term-dot red' }),
            React.createElement('div', { className: 'term-dot yellow' }),
            React.createElement('div', { className: 'term-dot green' })
          ),
          React.createElement('div', { className: 'term-title' }, 'GHC Debug Console — GlitchHunter.exe v2.4.1'),
          React.createElement('div', { className: 'term-title-spacer' })
        ),

        React.createElement('div', { className: 'term-body', ref: null },
          messages.length === 0
            ? React.createElement('div', { className: 'loading-container' },
                React.createElement('div', { className: 'loading-inner' },
                  React.createElement('div', { className: 'loading-text' }, 'Initializing system...'),
                  React.createElement('div', { className: 'loading-dots' },
                    React.createElement('div', { className: 'dot' }),
                    React.createElement('div', { className: 'dot' }),
                    React.createElement('div', { className: 'dot' })
                  )
                )
              )
            : messages.map((msg, i) => {
                const isJS = msg.type === 'js';
                const isProgress = msg.isProgress;
                let content;

                if (isProgress) {
                  content = React.createElement('div', { className: 'leading-relaxed', style: { color: '#4ade80', fontFamily: 'monospace', fontSize: 13, whiteSpace: 'pre-wrap' } },
                    React.createElement('svg', { className: 'spinner', viewBox: '0 0 24 24' },
                      React.createElement('circle', { cx: 12, cy: 12, r: 10 }),
                      React.createElement('path', { d: 'M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z' })
                    ),
                    msg.content
                  );
                } else if (isJS) {
                  content = renderJSContent(msg.content);
                } else {
                  content = renderDiffContent(msg.content);
                }

                return React.createElement('div', {
                  key: i,
                  className: 'msg' + (isJS ? ' js-block' : ''),
                  style: isProgress ? { marginBottom: 8 } : {}
                }, content);
              }),
          React.createElement('div', { ref: messagesEndRef })
        ),

        React.createElement('div', { className: 'term-input-area' },
          React.createElement('div', { className: 'term-input-row' },
            React.createElement('span', { className: 'term-prompt' + (focused ? '' : ' dim') }, '❯'),
            React.createElement('input', {
              ref: inputRef,
              type: 'text',
              value: input,
              onChange: e => setInput(e.target.value),
              onKeyDown: handleKeyDown,
              onFocus: () => setFocused(true),
              onBlur: () => setFocused(false),
              className: 'term-input',
              placeholder: 'Type a command... (try ls, cat, cd, sudo)',
              spellCheck: false,
              autoComplete: 'off'
            }),
            input.length > 0 && React.createElement('span', { className: 'term-enter-hint' }, '⏎')
          )
        )
      );
    }

    // ---- App Component ----
    function App() {
      const [messages, setMessages] = useState([]);
      const [history, setHistory] = useState([]);
      const [adminLevel, setAdminLevel] = useState(0);
      const [decrypted, setDecrypted] = useState(false);
      const [patchesApplied, setPatchesApplied] = useState(false);
      const [rebuilt, setRebuilt] = useState(false);
      const [launched, setLaunched] = useState(false);
      const [currentPath, setCurrentPath] = useState("/");
      const [exploredFiles, setExploredFiles] = useState(new Set());
      const messagesEndRef = useRef(null);
      const animatingRef = useRef(false);
      const initialRef = useRef(false);

      const scrollBottom = useCallback(() => {
        setTimeout(() => {
          if (messagesEndRef.current) {
            messagesEndRef.current.scrollIntoView({ behavior: 'smooth' });
          }
        }, 50);
      }, []);

      const addMsg = useCallback((content, type, isProgress = false) => {
        setMessages(prev => [...prev, { content, type, timestamp: Date.now(), isProgress }]);
        scrollBottom();
      }, [scrollBottom]);

      const animateProgress = useCallback(async (frames, delay = 300) => {
        animatingRef.current = true;
        for (let i = 0; i < frames.length; i++) {
          if (!animatingRef.current) break;
          const line = frames[i];
          setMessages(prev => {
            const msgs = [...prev];
            if (msgs.length > 0 && msgs[msgs.length - 1].isProgress) {
              msgs[msgs.length - 1] = { content: line, type: 'diff', timestamp: Date.now(), isProgress: true };
              return msgs;
            }
            return [...msgs, { content: line, type: 'diff', timestamp: Date.now(), isProgress: true }];
          });
          scrollBottom();
          await new Promise(r => setTimeout(r, delay));
        }
        setMessages(prev => {
          const msgs = [...prev];
          if (msgs.length > 0 && msgs[msgs.length - 1].isProgress) {
            msgs[msgs.length - 1] = { ...msgs[msgs.length - 1], isProgress: false };
          }
          return msgs;
        });
        animatingRef.current = false;
      }, [scrollBottom]);

      // Init
      useEffect(() => {
        if (initialRef.current) return;
        initialRef.current = true;
        addMsg(
          `- GlitchHunter.exe has crashed
+ type start to try to repair GlitchHunter.exe`,
          'diff'
        );
      }, [addMsg]);

      const addUserInput = useCallback((input) => {
        addMsg(`> ${input}`, 'diff');
      }, [addMsg]);

      const adminTitles = [
        'Unprivileged Operator',
        'Junior Operator',
        'Senior Operator',
        'System Administrator',
        'Root Administrator',
        'GHC — Master Access'
      ];

      // ===================== HELPER FUNCTIONS =====================
      const getVisibleFiles = (path, level) => {
        const dir = filesystem[path];
        if (!dir || dir.type !== "dir") return [];
        
        return dir.children.filter(name => {
          const fullPath = path === "/" ? `/${name}` : `${path}${name}`;
          const entry = filesystem[fullPath];
          if (!entry) return false;
          return entry.minLevel <= level;
        });
      };

      const resolvePath = (path) => {
        if (path.startsWith("/")) return path;
        if (currentPath === "/") return `/${path}`;
        return `${currentPath}${path}`;
      };

      // ===================== PROCESS COMMAND =====================
      const processCmd = useCallback(async (input) => {
        if (animatingRef.current) return;
        const trimmed = input.trim();
        const lower = trimmed.toLowerCase();

        setHistory(prev => [...prev, input]);
        addUserInput(input);

        if (lower === 'clear') {
          setMessages([]);
          setTimeout(() => {
            addMsg(
              `- GlitchHunter.exe has crashed
+ type start to try to repair GlitchHunter.exe`,
              'diff'
            );
          }, 50);
          return;
        }
        if (!lower) {
          addMsg("? Please enter a command. Type 'help' for available commands.", 'diff');
          return;
        }

        // SUDO (Level 1)
        if (lower.startsWith('sudo ')) {
          const pw = lower.slice(5).trim();
          if (pw === SUDO_PASSWORD_1 || pw === SUDO_PASSWORD_2) {
            if (adminLevel >= 1) {
              addMsg('+ Sudo access already granted.', 'diff');
              return;
            }
            addMsg('+ Authenticating...', 'diff');
            await animateProgress(pBar5Frames, 250);
            addMsg(
              `+ ═══════════════════════════════════
  SUDO ACCESS GRANTED
  ═══════════════════════════════════

+ Authentication successful!
+ Admin level increased: 0 → 1

  New privileges unlocked:
  + ls, cat, cd, grep
  + employees, memo

  ▓░░░░ (1/5) — Junior Operator

  Welcome aboard, Operator.
  Try: ls`,
              'diff'
            );
            setAdminLevel(1);
          } else {
            addMsg(`? Access denied: Incorrect password`, 'diff');
          }
          return;
        }

        // ===================== SHELL COMMANDS =====================
        if (adminLevel >= 1) {
          // CD
          if (lower.startsWith('cd ')) {
            const target = lower.slice(3).trim();
            if (target === ".." || target === "../") {
              if (currentPath !== "/") {
                const newPath = currentPath.substring(0, currentPath.lastIndexOf("/", currentPath.length - 2) + 1) || "/";
                setCurrentPath(newPath);
                addMsg(`+ Changed directory to ${newPath}`, 'diff');
              } else {
                addMsg('? Already at root', 'diff');
              }
              return;
            }
            
            const newPath = resolvePath(target.endsWith("/") ? target : target + "/");
            const dirEntry = filesystem[newPath];
            
            if (dirEntry && dirEntry.type === "dir" && dirEntry.minLevel <= adminLevel) {
              setCurrentPath(newPath);
              addMsg(`+ Changed directory to ${newPath}`, 'diff');
            } else {
              addMsg(`? Directory not found or access denied: ${target}`, 'diff');
            }
            return;
          }

          // LS
          if (lower === 'ls' || lower.startsWith('ls ')) {
            const targetPath = lower === 'ls' ? currentPath : resolvePath(lower.slice(3).trim());
            const dir = filesystem[targetPath];
            
            if (!dir || dir.type !== "dir") {
              addMsg(`? Not a directory: ${targetPath}`, 'diff');
              return;
            }
            if (dir.minLevel > adminLevel) {
              addMsg(`? Access denied. Required level: ${dir.minLevel}`, 'diff');
              return;
            }
            
            const files = getVisibleFiles(targetPath, adminLevel);
            addMsg(`+ Directory: ${targetPath}
${files.map(f => `  ${f}`).join('\n') || '  (empty)'}`, 'diff');
            return;
          }

          // CAT
          if (lower.startsWith('cat ')) {
            const filename = lower.slice(4).trim();
            const fullPath = resolvePath(filename);
            const entry = filesystem[fullPath];
            
            if (!entry) {
              addMsg(`? File not found: ${filename}`, 'diff');
              return;
            }
            if (entry.type === "dir") {
              addMsg(`? ${filename} is a directory. Use "ls ${filename}" or "cd ${filename}"`, 'diff');
              return;
            }
            if (entry.minLevel > adminLevel) {
              addMsg(`? Access denied. Required level: ${entry.minLevel}`, 'diff');
              return;
            }
            
            addMsg(entry.content, 'diff');
            setExploredFiles(prev => new Set([...prev, fullPath]));
            
            if (fullPath.includes('employees') && adminLevel < 2) {
              setAdminLevel(2);
              addMsg(`+ Admin level increased to 2 (file exploration)`, 'diff');
            }
            if (fullPath.includes('codex') && adminLevel < 3) {
              setAdminLevel(3);
              addMsg(`+ Admin level increased to 3 (codex discovered)`, 'diff');
            }
            return;
          }

          // GREP
          if (lower.startsWith('grep ')) {
            const term = lower.slice(5).trim();
            let found = false;
            
            Object.keys(filesystem).forEach(key => {
              const entry = filesystem[key];
              if (entry.type === "file" && entry.minLevel <= adminLevel && entry.content.toLowerCase().includes(term)) {
                const lines = entry.content.split('\\n').filter(l => l.toLowerCase().includes(term));
                addMsg(`+ Found in ${key}:
${lines.join('\\n')}`, 'diff');
                found = true;
              }
            });
            
            if (!found) addMsg(`? No matches for "${term}"`, 'diff');
            return;
          }

          // SHIFT (Caesar)
          if (lower.startsWith('shift ')) {
            const args = lower.slice(6).trim().split(' ');
            if (args.length < 2) {
              addMsg('? Usage: shift <text> <shift>', 'diff');
              return;
            }
            const text = args.slice(0, -1).join(' ');
            const shift = parseInt(args[args.length - 1]);
            
            if (isNaN(shift)) {
              addMsg('? Invalid shift value', 'diff');
              return;
            }
            
            const shifted = text.split('').map(char => {
              if (char.match(/[a-z]/i)) {
                const code = char.charCodeAt(0);
                const base = char === char.toUpperCase() ? 65 : 97;
                return String.fromCharCode(((code - base + shift) % 26) + base);
              }
              return char;
            }).join('');
            
            addMsg(`+ Caesar shift result (${shift}):
${shifted}`, 'diff');
            
            if (shift === CAESAR_SHIFT && adminLevel < 3) {
              setAdminLevel(3);
              addMsg(`+ Correct shift found! Admin level → 3`, 'diff');
            }
            return;
          }
        }

        // ===================== LEVEL PROGRESSION =====================
        if (lower === 'analyze' && adminLevel >= 1) {
          addMsg(`+ Analysis complete.
+ Shell commands fully unlocked.`, 'diff');
          if (adminLevel < 2) setAdminLevel(2);
          return;
        }

        if (lower === 'codex' && adminLevel >= 2) {
          addMsg(`+ GHC CODEX — Recovery Database
+ Caesar shift key: 7
+ Use: shift <text> 7`, 'diff');
          if (adminLevel < 3) setAdminLevel(3);
          return;
        }

        if (lower.startsWith('decrypt ')) {
          const key = lower.slice(8).trim();
          if (key === LEVEL3_DECRYPT_KEY && adminLevel >= 3) {
            if (decrypted) { addMsg('+ Already decrypted.', 'diff'); return; }
            addMsg('+ Decryption successful! Use "patch" next.', 'diff');
            setDecrypted(true);
          } else {
            addMsg(`? Invalid key or insufficient level.
+ Hint: tridentify_protocol`, 'diff');
          }
          return;
        }

        if (lower === 'patch') {
          if (adminLevel < 3) { addMsg('? Level too low.', 'diff'); return; }
          if (!decrypted) { addMsg('? Decrypt first.', 'diff'); return; }
          addMsg('+ Applying patches...', 'diff');
          await animateProgress(pBar10Frames, 250);
          addMsg(`+ Patch applied successfully!
+ Admin level increased to 4`, 'diff');
          setPatchesApplied(true);
          setAdminLevel(4);
          return;
        }

        if (lower === 'rebuild') {
          if (adminLevel < 4) { addMsg('? Level too low.', 'diff'); return; }
          if (!patchesApplied) { addMsg('? Apply patch first.', 'diff'); return; }
          addMsg('+ Rebuilding executable...', 'diff');
          await animateProgress(pBar10Frames, 300);
          addMsg(`+ Rebuild complete!
+ Admin level increased to 5`, 'diff');
          setRebuilt(true);
          setAdminLevel(5);
          return;
        }

        if (lower === 'launch') {
          if (adminLevel < 5) { addMsg('? Level too low.', 'diff'); return; }
          if (!rebuilt) { addMsg('? Rebuild first.', 'diff'); return; }
          const cmd = getCommand('launch');
          if (cmd) addMsg(cmd.message, cmd.type);
          setLaunched(true);
          return;
        }

        // ===================== LORE & ADMIN =====================
        if (lower === 'admin' || lower === 'level') {
          const bar = '▓'.repeat(adminLevel) + '░'.repeat(5 - adminLevel);
          addMsg(
            `+ ═══════════════════════════════════
  ADMIN LEVEL STATUS
  ═══════════════════════════════════

  Current Level: ${adminLevel}/5 ${bar}
  Title: ${adminTitles[adminLevel]}`,
            'diff'
          );
          return;
        }

        if (lower === 'employees' && adminLevel >= 1) {
          const cmd = getCommand('employees');
          if (cmd) addMsg(cmd.message, cmd.type);
          return;
        }
        if (lower === 'archives' && adminLevel >= 2) {
          const cmd = getCommand('archives');
          if (cmd) addMsg(cmd.message, cmd.type);
          return;
        }
        if (lower === 'memo' && adminLevel >= 1) {
          const cmd = getCommand('memo');
          if (cmd) addMsg(cmd.message, cmd.type);
          return;
        }

        // ===================== DYNAMIC HELP =====================
        if (lower === 'help') {
          let helpText = `+ ═══════════════════════════════════
  GLITCHHUNTER.EXE — HELP (Level ${adminLevel})
  ═══════════════════════════════════

  Available commands:`;

          const available = [];
          
          if (adminLevel >= 0) available.push("help, start, clear, about, status, version, logs, sudo");
          if (adminLevel >= 1) available.push("ls, cat, cd, grep, employees, memo");
          if (adminLevel >= 2) available.push("archives, analyze, codex");
          if (adminLevel >= 3) available.push("shift, decrypt");
          if (adminLevel >= 4) available.push("patch");
