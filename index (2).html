    function formatLine(line, i, isDiff) {
      const t = line.trimStart();

      if (/^\\[[#_ \\]]+\\]$/.test(line.trim())) {
        const filled = (line.match(/#/g) || []).length;
        const total = (line.match(/[#_]/g) || []).length;
        const pct = total > 0 ? Math.round((filled / total) * 100) : 0;

          line,
          pct > 0 && React.createElement('span', { key: 'pct', style: { color: 'rgba(52,211,153,0.5)', marginLeft: 8, fontSize: 11 } }, pct + '%')
        );
      }

      if (!isDiff) {
        if (t.startsWith('//')) {
          return React.createElement('div', { key: i, className: 'leading-relaxed', style: { color: '#64748b', fontStyle: 'italic' } }, line);
        }
        if (t.includes('console.')) {

          );
        }
        return React.createElement('div', { key: i, className: 'leading-relaxed', style: { color: '#e2e8f0' } }, line);
      }

      if (/^[║═╔╗╚╝╠╣╦╩╬┌┐└┘├┤┬┴┼]/.test(t)) {
        return React.createElement('div', { key: i, className: 'leading-relaxed', style: { color: '#34d399', opacity: 0.7 } }, line);
      }

      if (t.startsWith('+')) {
        const rest = t.slice(1).trimStart();
        return React.createElement('div', { key: i, className: 'leading-relaxed' },
          React.createElement('span', { style: { color: '#34d399' } }, '+ '),
          React.createElement('span', null, rest)
        );
      }
      if (t.startsWith('-')) {
        return React.createElement('div', { key: i, className: 'leading-relaxed' },
          React.createElement('span', { style: { color: '#f87171', fontWeight: 'bold' } }, '- '),
          React.createElement('span', { style: { color: 'rgba(252,165,165,0.9)' } }, t.slice(1).trimStart())

        );
