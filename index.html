        if (lower === 'clear') {
          setMessages([]);
          return;
        }
        if (!lower) {
          addMsg("? Please enter a command. Type 'help' for available commands.", 'diff');
          return;
        }

        // SUDO check
        if (lower.startsWith('sudo ')) {
          const pw = lower.slice(5).trim();
          if (pw === SUDO_PASSWORD_1 || pw === SUDO_PASSWORD_2) {
            if (adminLevel >= 1) {
              addMsg('+ Sudo access already granted.', 'diff');
              return;
            }
            addMsg('+ Authenticating...', 'diff');
            await animateProgress(pBar5Frames, 250);
            addMsg(
              `+ ═══════════════════════════════════
  SUDO ACCESS GRANTED
  ═══════════════════════════════════
  
+ Authentication successful!
+ Admin level increased: 0 → 1
  
  New privileges unlocked:
  + extract   - Extract corrupted sectors
  + analyze   - Analyze extracted data
  + admin     - Check your admin level
  
  ▓░░░░ (1/5) — Junior Operator
  
  Welcome aboard, Operator.`,
              'diff'
            );
            setAdminLevel(1);
          } else {
            addMsg(
              `? Access denied: Incorrect password
+ Usage: sudo <password>
+ Hint: Check "version" or "logs"
+ Tip: Try "decode" to convert HEX`,
              'diff'
            );
          }
          return;
        }

        // DECRYPT check
        if (lower.startsWith('decrypt ')) {
          const key = lower.slice(8).trim();
          if (key === DECRYPT_KEY && adminLevel >= 2) {
            if (decrypted) { addMsg('+ Patch already decrypted.', 'diff'); return; }
            addMsg('+ Initializing decryption...', 'diff');
            await animateProgress(pBar8Frames, 300);
            addMsg(
              `+ Decryption successful!
  
  Extracted patch manifest:
  - Patch: GHC_PATCH_v2.4.1_CRITICAL
  - Target: GlitchHunter.exe
  - Fixes: NULL_PTR at 0x3C, STACK_SMASH at 0x8F
  - Author: GHC (Legacy Build)
  
+ Patch ready for application.
+ Use "patch" to apply.`,
              'diff'
            );
            setDecrypted(true);
          } else if (key !== DECRYPT_KEY) {
            addMsg(
              `+ Decryption failed: Invalid key.
+ Hint: The key was in the version history.
+ Check "version" again carefully.`,
              'diff'
            );
          } else {
            addMsg(
              `? Admin level too low.
+ Current: ${adminLevel}/5
+ Required: 2
+ Try upgrading your admin level first.`,
              'diff'
            );
          }
          return;
        }

        // admin / level check
        if (lower === 'admin' || lower === 'level') {
          const bar = '\u2593'.repeat(adminLevel) + '\u2591'.repeat(5 - adminLevel);
          addMsg(
            `+ ═══════════════════════════════════
  ADMIN LEVEL STATUS
  ═══════════════════════════════════
  
  Current Level: ${adminLevel}/5 ${bar}
  Title: ${adminTitles[adminLevel] || 'Unknown'}
  
  ${adminLevel === 0
    ? `Next unlock: Level 1
  Requirement: Valid sudo password
  
  Tip: Found any passwords yet?
  - Check "version" for security codes
  - Check "logs" for HEX encoded strings
  - Use "decode" to convert HEX to text`
    : adminLevel < 5
    ? `Next unlock: Level ${adminLevel + 1}
  ${adminLevel === 1 ? "Requirement: Explore extracted data, use analyze" :
    adminLevel === 2 ? "Requirement: Find decryption key in version history" :
    adminLevel === 3 ? "Requirement: Apply patch to GlitchHunter.exe" :
    adminLevel === 4 ? "Requirement: Rebuild the executable" : ""}`
    : "Maximum level reached. You have full system access."}`,
            'diff'
          );
          return;
        }

        // analyze → level up to 2
        if (lower === 'analyze' && adminLevel < 2) {
          const cmd = getCommand('analyze');
          if (cmd) addMsg(cmd.message, cmd.type);
          setAdminLevel(prev => Math.max(prev, 2));
          return;
        }

        // codex → level up to 3
        if (lower === 'codex' && adminLevel < 3) {
          const cmd = getCommand('codex');
          if (cmd) addMsg(cmd.message, cmd.type);
          setAdminLevel(prev => Math.max(prev, 3));
          return;
        }

        // patch checks
        if (lower === 'patch') {
          if (adminLevel < 3) {
            addMsg(`? Cannot apply patch: admin level too low.
+ Current: ${adminLevel}/5
+ Required: 3
+ Use "codex" and "decrypt" first.`, 'diff');
            return;
          }
          if (adminLevel >= 3 && !decrypted) {
            addMsg(`? Patch is encrypted. Decrypt it first.
+ Use "decrypt <key>" to unlock the patch.
+ Hint: The key is in the version history.`, 'diff');
            return;
          }
          if (patchesApplied) {
            addMsg("+ Patches already applied. Use 'rebuild' next.", 'diff');
            return;
          }
          addMsg('+ Applying recovery patches...', 'diff');
          await animateProgress(pBar10Frames, 250);
          addMsg(
            `+ ═══════════════════════════════════
  PATCH APPLICATION COMPLETE
  ═══════════════════════════════════
  
  [0x00] BIT_FLIP      → FIXED ✓
  [0x3C] NULL_PTR      → FIXED ✓ (CRITICAL)
  [0x8F] STACK_SMASH   → FIXED ✓
  [0xE2] BUFFER_OVF    → FIXED ✓
  
  ┌─────────────────────────────────────────┐
  │  Patch applied successfully!            │
  │  4/4 sectors repaired                   │
  │  GlitchHunter.exe is now intact         │
  └─────────────────────────────────────────┘
  
+ System integrity: 96% (minor residual errors)
+ Use "rebuild" to complete the executable`,
            'diff'
          );
          setPatchesApplied(true);
          setAdminLevel(prev => Math.max(prev, 4));
          return;
        }

        // rebuild checks
        if (lower === 'rebuild') {
          if (adminLevel < 4) {
            addMsg(`? Cannot rebuild: admin level too low.
+ Current: ${adminLevel}/5
+ Required: 4
+ Apply patches first with "patch"`, 'diff');
            return;
          }
          if (adminLevel >= 4 && !patchesApplied) {
            addMsg(`? Cannot rebuild: patches not applied.
+ Use "patch" to apply the recovery patches first.`, 'diff');
            return;
          }
          if (rebuilt) {
            addMsg("+ Already rebuilt. Use 'launch' to start GlitchHunter.exe.", 'diff');
            return;
          }
          addMsg('+ Rebuilding GlitchHunter.exe...', 'diff');
          await animateProgress(pBar10Frames, 300);
          addMsg(
            `+ ═══════════════════════════════════
  REBUILD COMPLETE
  ═══════════════════════════════════
  
  [OK] Segment .text: Rebuilt
  [OK] Segment .data: Rebuilt
  [OK] Segment .rodata: Rebuilt
  [OK] Segment .bss: Initialized
  [OK] Relocation table: Updated
  [OK] Symbol table: Restored
  
  ┌─────────────────────────────────────────┐
  │  Rebuild complete!                      │
  │  GlitchHunter.exe v2.4.1               │
  │  Size: 2.4 MB                           │
  │  Integrity: 100%                        │
  └─────────────────────────────────────────┘
  
+ Executable ready for launch!
+ Use "verify" for final system check
+ Then use "launch" to start GlitchHunter.exe`,
            'diff'
          );
          setRebuilt(true);
          setAdminLevel(prev => Math.max(prev, 5));
          return;
        }

        // launch checks
        if (lower === 'launch') {
          if (adminLevel < 5) {
            addMsg(`? Cannot launch: admin level too low.
+ Current: ${adminLevel}/5
+ Required: 5
+ Rebuild the executable first with "rebuild"`, 'diff');
            return;
          }
          if (adminLevel >= 5 && !rebuilt) {
            addMsg(`? Cannot launch: executable not rebuilt.
+ Use "rebuild" to complete the reconstruction.`, 'diff');
            return;
          }
          if (launched) {
            addMsg("+ GlitchHunter.exe is already running!", 'diff');
            return;
          }
          const cmd = getCommand('launch');
          if (cmd) addMsg(cmd.message, cmd.type);
          setLaunched(true);
          return;
        }

        // STANDARD lookup
        const cmd = getCommand(lower);
        if (cmd) {
          addMsg(cmd.message, cmd.type);
        } else {
          // Suggestions
          const allCmds = ["help","start","diagnostics","status","version","logs","inspect","about","admin","more","clear","sudo","decode","extract","analyze","codex","decrypt","patch","rebuild","verify","launch"];
          const close = allCmds.filter(c => c.startsWith(lower) || lower.startsWith(c));
          const suggestion = close.length > 0 ? `+ Did you mean: ${close.slice(0, 3).join(", ")}?` : '';
          addMsg(
            `? Unknown command: "${input}"
+ Type "help" to see available commands
${suggestion}`,
            'diff'
          );
        }
      }, [adminLevel, decrypted, patchesApplied, rebuilt, launched, addUserInput, addMsg, animateProgress]);

      const adminBar = '\u2593'.repeat(adminLevel) + '\u2591'.repeat(5 - adminLevel);

      return React.createElement(React.Fragment, null,
        // Top bar
        React.createElement('div', { className: 'top-bar' },
          React.createElement('div', { className: 'top-bar-left' },
            React.createElement('div', { className: 'status-dot' }),
            React.createElement('span', { className: 'status-label' }, 'GHC Terminal'),
            React.createElement('span', { className: 'top-bar-divider' }, '|'),
            React.createElement('span', { className: 'admin-text' },
              'Admin: ',
              React.createElement('span', { className: 'admin-bar' }, adminBar),
              React.createElement('span', { className: 'admin-num' }, ` ${adminLevel}/5`)
            )
          ),
          React.createElement('span', { className: 'lock-status' },
            adminLevel < 3 ? '\uD83D\uDD12 LOCKED' : adminLevel < 5 ? '\uD83D\uDD13 UNLOCKING' : '\u2705 SECURE'
          )
        ),

        // Terminal wrapper
        React.createElement('div', { className: 'terminal-wrapper' },
          React.createElement('div', { className: 'terminal-glow' }),
          React.createElement(Terminal, {
            messages,
            onCommand: processCmd,
            history,
            messagesEndRef
          })
        ),

        // Footer
        React.createElement('div', { className: 'footer-hints' },
          React.createElement('div', { className: 'footer-hints-inner' },
            React.createElement('span', { className: 'hint' }, '\u2191\u2193 History'),
            React.createElement('span', { className: 'hint' }, '\u23CE Send'),
            React.createElement('span', { className: 'hint' }, '\u21E5 Complete'),
            React.createElement('span', { className: 'hint' }, 'help \u2014 Commands')
          )
        )
      );
    }

    // Mount
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
